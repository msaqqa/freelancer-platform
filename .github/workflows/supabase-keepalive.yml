name: Supabase Keep-Alive

# Supabase free-tier projects pause after ~7 days of inactivity. This job pings
# the REST API on a schedule so the project stays active. The 3-day interval
# leaves a safety margin (GitHub may delay scheduled runs under load).
on:
  schedule:
    - cron: '0 6 */3 * *' # every 3 days at 06:00 UTC
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl --fail --silent --show-error \
            "${{ secrets.SUPABASE_URL }}/rest/v1/countries?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
